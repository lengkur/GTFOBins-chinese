unprivileged:
  label: 普通用户
  description: 此功能可由任意普通用户执行。

sudo:
  label: Sudo
  description: 通过 `sudo` 执行时，如果程序没有丢弃已获得的权限，此功能会以特权用户身份执行。
  extra:
    environment: 如果涉及环境变量，需要通过 `sudo VAR=value ...` 传入，或先导出变量再使用 `sudo -E ...`。

suid:
  label: SUID
  description: 如果可执行文件设置了 SUID 位并且属主正确，且程序没有丢弃有效权限，此功能会以特权用户身份执行。
  extra:
    shell:
      true: 此程序通过系统 shell 运行命令，例如调用 `system` 等函数；因此它只适用于默认 shell 不会丢弃 SUID 权限的发行版。
      false: 此程序会直接运行命令，例如调用 `exec` 等函数；如果发行版的默认 shell 不会丢弃 SUID 权限，记得省略每个 `/bin/sh` 调用中的 `-p` 参数。

capabilities:
  label: Capabilities
  description: 如果可执行文件设置了特定 capabilities，此功能可绕过常规内核权限检查执行。
  extra:
    list: '需要以下 capabilities：'
